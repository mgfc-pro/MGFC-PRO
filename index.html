<!DOCTYPE html>

<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;

}
body{background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input,textarea,select{font-family:'DM Sans',sans-serif;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;outline:none;font-size:13px;width:100%}
input:focus,textarea:focus,select:focus{border-color:var(--acc)}
select option{background:var(--bg2)}
.screen{display:none;min-height:100vh}.screen.show{display:block}
#ls{display:flex;align-items:center;justify-content:center;padding:40px 20px;min-height:100vh}
.lb{width:100%;max-width:360px}
.ll{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:2px;color:var(--acc)}
.ll span{color:var(--text)}
.lsub{font-size:13px;color:var(--muted);margin-bottom:28px}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;margin-top:12px}
.lbtn{width:100%;margin-top:18px;background:var(--acc);color:#0a0a0a;border:none;font-size:14px;font-weight:500;padding:13px;border-radius:10px}
.lbtn:hover{opacity:.9}
.lerr{color:var(--red);font-size:12px;margin-top:8px;text-align:center;min-height:18px}
.loader{position:fixed;inset:0;background:rgba(10,10,10,.92);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loader.show{display:flex}
.lspin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lmsg{font-size:13px;color:var(--muted)}
.tnav{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);background:rgba(10,10,10,.97);position:sticky;top:0;z-index:100}
.tlogo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--acc)}
.tlogo span{color:var(--text)}
.ntabs{display:flex;gap:2px}
.ntab{background:none;border:none;color:var(--muted);font-size:12px;font-weight:500;padding:5px 11px;border-radius:20px;transition:.2s}
.ntab:hover,.ntab.on{background:var(--bg3);color:var(--text)}
.ntab.on{color:var(--acc)}
.navr{display:flex;align-items:center;gap:8px}
.btp{display:flex;align-items:center;gap:5px;border:1px solid var(--border);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--muted);cursor:pointer;transition:.2s}
.btp:hover{border-color:var(--blue);color:var(--blue)}
.btp.on{border-color:var(--green);color:var(--green)}

.pc{padding:18px;max-width:800px;margin:0 auto}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}

.cav2{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;margin-bottom:8px}

.ep{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.ep-t{font-weight:500;font-size:13px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.editrow{display:grid;grid-template-columns:2fr 55px 55px 85px 28px;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}

.db2{background:none;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:5px;font-size:12px;flex-shrink:0}
.db2:hover{border-color:var(--red);color:var(--red)}
.addbtn{background:none;border:1px dashed var(--border);color:var(--muted);padding:8px;border-radius:9px;width:100%;margin-top:8px;font-size:11px;transition:.2s}
.addbtn:hover{border-color:var(--acc);color:var(--acc)}
.savebtn{background:var(--acc);color:#0a0a0a;border:none;font-size:12px;font-weight:500;padding:9px 18px;border-radius:9px;flex-shrink:0}
.nb{height:70px;resize:none;font-size:12px;margin-top:7px}

.cr-modal{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:300;overflow-y:auto;padding:20px}

<body>

<div class="loader" id="loader"><div class="lspin"></div><div class="lmsg" id="lmsg">Chargement...</div></div>
<div class="toast" id="toast"></div>

<div class="screen show" id="ls">
  <div style="display:flex;align-items:center;justify-content:center;padding:50px 20px;min-height:100vh">
    <div class="lb">
      <div class="ll">MGFC<span> Pro</span></div>
      <div class="lsub">Muscu Guidée par la Fréquence Cardiaque</div>

<script>
const SB_URL = 'https://ynzmdsuodmvlvljvfbzw.supabase.co';
const SB_KEY = 'sb_publishable_uOjfU8EwOHUcBb_sy-HagQ_Aeu056d6';

async function sbSelect(table, filters={}, order=null){
  let url = `${SB_URL}/rest/v1/${table}?select=*`;
  for(const [k,v] of Object.entries(filters)) url += `&${k}=eq.${encodeURIComponent(v)}`;
  if(order) url += `&order=${order}`;
  const r = await fetch(url, {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'}});
  return await r.json();
}
async function sbUpdate(table, id, data){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body: JSON.stringify(data)
  });
  return r.ok;
}
async function sbInsert(table, data){
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body: JSON.stringify(data)
  });
  return await r.json();
}
async function sbDelete(table, id){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method:'DELETE',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  return r.ok;
}

const COACH = {email:'thomas.lombard@sfr.fr', pwd:'1201', nom:'Lombard', prenom:'Thomas', initiale:'T', role:'coach'};
let CU=null, allClients=[], selSess=0;
let livePhase='idle', liveExIdx=0, liveSet=0, liveSets=[], timerIv=null, timerSec=0, liveFC=80;
let coachSelIdx=null, coachSessIdx=0, coachCache={};

// ===== ENREGISTREMENT FC EN MEMOIRE =====
let fcData = []; // [{t: secondes, v: bpm}]
let fcRecordIv = null;
let fcStartTime = null;

function startFCRecord(){
  fcData = [];
  fcStartTime = Date.now();
  if(fcRecordIv) clearInterval(fcRecordIv);
  fcRecordIv = setInterval(()=>{
    const fc = liveFC;
    if(fc > 0){
      fcData.push({
        t: Math.round((Date.now() - fcStartTime) / 1000),
        v: fc
      });
    }
  }, 5000);
}

function stopFCRecord(){
  if(fcRecordIv){ clearInterval(fcRecordIv); fcRecordIv = null; }
}

function loader(show, msg='Chargement...'){
  document.getElementById('loader').classList.toggle('show',show);
  document.getElementById('lmsg').textContent=msg;
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

async function doLogin(){
  const email=document.getElementById('lem').value.trim();
  const pwd=document.getElementById('lpw').value.trim();
  const err=document.getElementById('lerr');
  err.textContent='';
  if(!email||!pwd){err.textContent='Remplis tous les champs';return;}
  if(email===COACH.email && pwd===COACH.pwd){
    CU={...COACH};
    loader(true,'Chargement des clients...');
    allClients = await sbSelect('clients',{},'prenom');
    loader(false);
    initApp(); return;
  }
  loader(true,'Connexion...');
  const data = await sbSelect('clients',{email});
  loader(false);
  if(!data||!data.length){err.textContent='Email introuvable';return;}
  const c=data[0];
  const expectedPwd = c.prenom.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s/g,'')+c.id.slice(0,4);
  const pwd2 = c.prenom.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s/g,'')+'123';
  const pwd3 = c.prenom.charAt(0).toUpperCase() + c.prenom.slice(1).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s/g,'') + '123';
  if(pwd!==expectedPwd && pwd!==pwd2 && pwd!==pwd3){err.textContent='Mot de passe incorrect';return;}
  CU={...c, role:'client', initiale:c.prenom[0].toUpperCase()};
  loader(true,'Chargement du programme...');
  const seances = await sbSelect('seances',{client_id:c.id},'ordre');
  const seanceIds = (seances||[]).map(s=>s.id);
  let exos = [];
  for(const sid of seanceIds){
    const ex = await sbSelect('exercices',{seance_id:sid},'ordre');
    if(ex) exos = exos.concat(ex);
  }
  loader(false);
  window._seances=seances||[];
  window._exos=exos;
  initApp();
}

function initApp(){
  document.getElementById('ls').classList.remove('show');
  document.getElementById('as').classList.add('show');
  document.getElementById('avp').textContent=CU.initiale;
  buildNav();
  if(CU.role==='client') showPage('prog');
  else{renderCoach();showPage('coach');}
}

function logout(){
  CU=null;allClients=[];window._seances=[];window._exos=[];
  document.getElementById('as').classList.remove('show');
  document.getElementById('ls').classList.add('show');
  document.getElementById('lem').value='';
  document.getElementById('lpw').value='';
}

function buildNav(){
  const tabs=CU.role==='coach'
    ?[{id:'coach',l:'Tableau de bord'},{id:'prog',l:'Démo'}]
    :[{id:'prog',l:'Mon Programme'},{id:'suivi',l:'Mon Suivi'}];
  document.getElementById('ntabs').innerHTML=tabs.map(t=>`<button class="ntab" id="nt-${t.id}" onclick="showPage('${t.id}')">${t.l}</button>`).join('');
}
function showPage(id){
  ['pgProg','pgLive','pgSuivi','pgCoach'].forEach(p=>document.getElementById(p).style.display='none');
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  const m={prog:'pgProg',live:'pgLive',suivi:'pgSuivi',coach:'pgCoach'};
  if(m[id])document.getElementById(m[id]).style.display='block';
  const n=document.getElementById('nt-'+id);if(n)n.classList.add('on');
  if(id==='prog')renderProg();
  if(id==='suivi')renderSuivi();
}

async function renderProg(){
  const pg=document.getElementById('pgProg');
  pg.innerHTML='<div class="pc" style="padding-top:30px;text-align:center;color:var(--muted)">Chargement...</div>';
  let clientData,clientSeances,clientExos;
  if(CU.role==='client'){
    clientData=CU; clientSeances=window._seances||[]; clientExos=window._exos||[];
  } else {
    if(!allClients.length) allClients=await sbSelect('clients',{},'prenom');
    clientData=allClients[0];
    if(!clientData){pg.innerHTML='<div class="pc">Aucun client</div>';return;}
    loader(true,'Chargement...');
    const s = await sbSelect('seances',{client_id:clientData.id},'ordre');
    const sIds = (s||[]).map(x=>x.id);
    let e = [];
    for(const sid of sIds){ const ex=await sbSelect('exercices',{seance_id:sid},'ordre'); if(ex) e=e.concat(ex); }
    loader(false);
    clientSeances=s||[]; clientExos=e;
  }
  const palH=clientData.palier_haut||Math.round(clientData.fc_max*.8);
  const palB=clientData.palier_bas||Math.round(clientData.fc_max*.6);
  const cols=Math.min(clientSeances.length,5);
  const cards=clientSeances.map((s,i)=>`
    <div class="wcard ${i===selSess?'sel':''}" onclick="selS(${i})">
      <div class="wd">${s.jour}</div><div class="wi">${s.icone||'💪'}</div>
      <div class="wn">${s.nom}</div>
      <div class="wtag ${s.type==='muscu'?'tm':'tc'}">${s.type==='muscu'?'Muscu MGFC':'Cardio FC'}</div>
    </div>`).join('');
  const s=clientSeances[selSess];
  if(!s){pg.innerHTML='<div class="pc">Aucune séance</div>';return;}
  const sexos=clientExos.filter(e=>e.seance_id===s.id).sort((a,b)=>a.ordre-b.ordre);
  const exRows=sexos.map((ex,j)=>`
    <div class="erow">
      <div class="enum">${j+1}</div>
      <div class="eico">${ex.icone||'💪'}</div>
      <div class="einfo">
        <div class="ename">${ex.nom}</div>
        <div class="edet">${ex.series} séries × ${ex.repetitions} · ${ex.charge}</div>
        ${!['cardio','échauffement','abdos','marche','cool down'].some(k=>ex.nom.toLowerCase().includes(k))?`
        <div class="fc-pills">
          <span class="fc-pill-stop">■ Stop à ${palH} bpm</span>
          <span class="fc-pill-go">▶ Reprendre à ${palB} bpm</span>
        </div>`:''}
        ${ex.note?`<div class="enote">${ex.note}</div>`:''}
      </div>
    </div>`).join('');
  pg.innerHTML=`<div class="pc">
    <div style="margin-bottom:14px">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px">${clientData.cycle||''}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:32px">Bonjour ${clientData.prenom} 👋</div>
      <div style="font-size:12px;color:var(--muted);margin-top:2px">FC max <span style="color:var(--acc);font-weight:500">${clientData.fc_max} bpm</span> · Reprendre <span style="color:var(--green)">${palB}</span> · Arrêter <span style="color:var(--red)">${palH}</span> bpm</div>
    </div>
    <div class="wgrid" style="grid-template-columns:repeat(${cols},1fr)">${cards}</div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px">
      <div class="sh">
        <div><div class="sh-t">${s.nom}</div><div class="sh-s">${s.jour} · ${sexos.length} exercices</div></div>
        <div style="text-align:right"><div style="font-size:9px;color:var(--muted);margin-bottom:2px">FC MAX</div><div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--acc)">${clientData.fc_max} bpm</div></div>
      </div>
      ${s.type!=='cardio'?`<div class="fcbar"><span class="hrt">♥</span><span style="margin-left:6px">→ <strong style="color:var(--red)">${palH} bpm</strong> arrêt · Récup → <strong style="color:var(--green)">${palB} bpm</strong> reprise</span></div>`:''}
      ${s.type==='cardio'&&s.cardio_note?`<div class="cbox">${s.cardio_note}</div>`:''}
      ${exRows}
      <div style="padding:12px 14px"><button class="sbtn" onclick="startLive()">▶ Démarrer cette séance en live</button></div>
    </div>
  </div>`;
  window._liveClient=clientData; window._liveSeances=clientSeances; window._liveExos=clientExos;
}

function selS(i){selSess=i;renderProg();}

function getExGif(nom){
  const n = nom.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
  for(const [key, url] of Object.entries(EX_IMGS)){
    const k = key.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    // Match exact ou partiel sur mots-clés principaux
    const kwords = k.split(' ').filter(w=>w.length>3);
    const match = k === n || n.includes(k) || k.includes(n) || 
                  kwords.some(w => n.includes(w));
    if(match){
      return `<img src="${url}" style="width:100%;height:100%;object-fit:contain;border-radius:10px;background:#fff" alt="${nom}">`;
    }
  }
  // Fallback emoji
  let icon='💪', color='#e8ff47', label='';
  if(n.includes('fente')||n.includes('squat')){icon='🦵';color='#47d9ff';label='Quadriceps';}
  else if(n.includes('curl')||n.includes('ischio')){icon='🦵';color='#ff8c42';label='Ischio';}
  else if(n.includes('adducteur')||n.includes('abducteur')){icon='🦵';color='#c084fc';label='Adducteurs';}
  else if(n.includes('hip')||n.includes('bassin')||n.includes('kick')){icon='🍑';color='#ff4545';label='Fessiers';}
  else if(n.includes('souleve')){icon='🏋️';color='#4ade80';label='Dos';}
  else if(n.includes('rowing')||n.includes('traction')||n.includes('chin')){icon='🔙';color='#47d9ff';label='Dos';}
  else if(n.includes('militaire')||n.includes('elevation')){icon='🔝';color='#ff8c42';label='Epaules';}
  else if(n.includes('biceps')){icon='💪';color='#4ade80';label='Biceps';}
  else if(n.includes('triceps')||n.includes('dips')){icon='💪';color='#c084fc';label='Triceps';}
  return `<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px"><span style="font-size:36px">${icon}</span><span style="font-size:10px;font-weight:600;color:${color}">${label||nom.split(' ')[0]}</span></div>`;
}(nom){
  const n=nom.toLowerCase();
  // Déterminer le groupe musculaire
  let icon='💪', color='#e8ff47', label='';
  if(n.includes('fente')||n.includes('squat')||n.includes('goblet')) {icon='🦵';color='#47d9ff';label='Quadriceps';}
  else if(n.includes('leg curl')||n.includes('ischio')||n.includes('roumain')||n.includes('good morning')) {icon='🦵';color='#ff8c42';label='Ischio-jambiers';}
  else if(n.includes('adducteur')) {icon='🦵';color='#c084fc';label='Adducteurs';}
  else if(n.includes('abducteur')) {icon='🦵';color='#c084fc';label='Abducteurs';}
  else if(n.includes('hip thrust')||n.includes('bassin')||n.includes('fessier')||n.includes('rear kick')||n.includes('total hip')||n.includes('kickback')) {icon='🍑';color='#ff4545';label='Fessiers';}
  else if(n.includes('soulevé')||n.includes('sdt')) {icon='🏋️';color='#4ade80';label='Ischio / Dos';}
  else if(n.includes('rowing')||n.includes('tirage')||n.includes('traction')||n.includes('chin')) {icon='🔙';color='#47d9ff';label='Dos';}
  else if(n.includes('développé couché')||n.includes('pec')||n.includes('incliné')||n.includes('prise serrée')) {icon='💪';color='#e8ff47';label='Pectoraux';}
  else if(n.includes('militaire')||n.includes('élévation')||n.includes('elevation')||n.includes('épaule')) {icon='🔝';color='#ff8c42';label='Épaules';}
  else if(n.includes('biceps')||n.includes('curl')) {icon='💪';color='#4ade80';label='Biceps';}
  else if(n.includes('triceps')||n.includes('dips')||n.includes('prise serrée')) {icon='💪';color='#c084fc';label='Triceps';}
  else if(n.includes('abdo')||n.includes('crunch')||n.includes('gainage')||n.includes('relevé')) {icon='⬡';color='#ff8c42';label='Abdominaux';}
  else if(n.includes('cardio')||n.includes('tapis')||n.includes('vélo')||n.includes('rameur')||n.includes('corde')) {icon='❤️';color='#ff4545';label='Cardio';}
  return \`<div style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(\${color.replace('#','')},0.08)">
    <span style="font-size:36px">\${icon}</span>
    <span style="font-size:10px;font-weight:600;color:\${color};text-align:center;padding:0 8px;letter-spacing:0.5px">\${label||nom.split(' ').slice(0,2).join(' ')}</span>
  </div>\`;
}

function renderLiveEx(){
  const sexos=window._liveSexos||[];
  const _c=window._liveC||{};
  const palH=_c.palier_haut||Math.round((_c.fc_max||185)*.8);
  const palB=_c.palier_bas||Math.round((_c.fc_max||185)*.6);
  if(!sexos.length){
    document.getElementById('lecur').innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px">Séance cardio</div>';
    document.getElementById('lelist').innerHTML='';
    document.getElementById('actbtn').textContent='Cardio en cours';
    document.getElementById('actbtn').disabled=true; return;
  }
  const ex=sexos[liveExIdx]; if(!ex) return;
  const pills=(liveSets[liveExIdx]||[]).map((st,i)=>{
    const c=st==='done'?'d':i===liveSet?'a':'t';
    return `<div class="sp ${c}">${i+1}</div>`;
  }).join('');
  document.getElementById('lecur').innerHTML=`
    <div class="exil" style="overflow:hidden;border-radius:12px;background:var(--bg3)">${getExGif(ex.nom)}</div>
    <div class="excn">${ex.nom}</div>
    <div class="excd">${ex.series} séries × ${ex.repetitions} · ${ex.charge}</div>
    ${!['cardio','échauffement','abdos','marche','cool down'].some(k=>ex.nom.toLowerCase().includes(k))?`
    <div style="display:flex;gap:6px;margin:6px 0;flex-wrap:wrap">
      <span style="background:rgba(255,69,69,.1);border:1px solid rgba(255,69,69,.25);color:var(--red);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px">■ Stop à ${palH} bpm</span>
      <span style="background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);color:var(--green);font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px">▶ Reprendre à ${palB} bpm</span>
    </div>`:''}
    ${ex.note?`<div style="font-size:10px;color:var(--blue);margin-bottom:7px;font-style:italic">${ex.note}</div>`:''}
    <div class="spills">${pills}</div>`;
  document.getElementById('lep').textContent=(liveExIdx+1)+'/'+sexos.length;
  document.getElementById('lelist').innerHTML=sexos.map((e,i)=>{
    const allD=(liveSets[i]||[]).every(x=>x==='done');
    const isCur=i===liveExIdx;
    return `<div class="er2 ${isCur?'cur':''} ${allD?'fin':''}">
      <div class="er2ico">${e.icone||'💪'}</div>
      <div class="er2n">${e.nom}<div style="font-size:9px;color:var(--muted)">${e.series}×${e.repetitions}</div></div>
      <div class="er2d ${allD?'d':isCur?'a':''}"></div>
    </div>`;
  }).join('');
  updateActBtn();
}

function updateActBtn(){
  const btn=document.getElementById('actbtn'); if(!btn) return;
  const palB=window._liveC?.palier_bas||Math.round((window._liveC?.fc_max||185)*.6);
  if(livePhase==='idle'){btn.textContent='▶ Démarrer la série';btn.disabled=false;}
  else if(livePhase==='serie'){btn.textContent='Surveille ta FC...';btn.disabled=true;}
  else if(livePhase==='recup'){
    if(liveFC<=palB){btn.textContent='▶ Reprendre la série';btn.disabled=false;}
    else{btn.textContent='⏳ Attends '+palB+' bpm...';btn.disabled=true;}
  }
}

function doAct(){
  if(livePhase==='idle'||livePhase==='recup'){
    livePhase='serie';
    if(liveSets[liveExIdx]) liveSets[liveExIdx][liveSet]='active';
    renderLiveEx(); onFC(liveFC,false);
  }
}

function onFC(val,fromSlider){
  if(fromSlider){const sv=document.getElementById('sv3');if(sv)sv.textContent=val;}
  liveFC=val;
  const c=window._liveC; if(!c) return;
  const s=window._liveS, sexos=window._liveSexos||[];
  const max=c.fc_max, palB=c.palier_bas||Math.round(max*.6), palH=c.palier_haut||Math.round(max*.8);
  const pct=Math.min(Math.round(val/max*100),100);
  const ne=document.getElementById('fcn'),gf=document.getElementById('gf2'),al=document.getElementById('lval'),pt=document.getElementById('phtag');
  if(!ne) return;
  ne.textContent=val; gf.style.width=pct+'%';
  if(s.type==='cardio'){
    const inZ=val>=palB&&val<=Math.round(max*.70);
    gf.style.background=inZ?'var(--blue)':'var(--orange)'; ne.style.color=inZ?'var(--blue)':'var(--orange)';
    pt.className='phtag phi'; pt.textContent='Cardio FC';
    al.className='abox ac'; al.textContent=inZ?'✓ Bonne zone':'⚡ Ajuste — cible '+palB+'–'+Math.round(max*.70)+' bpm';
    return;
  }
  if(livePhase==='idle'){
    gf.style.background='var(--muted)'; ne.style.color='var(--muted)';
    pt.className='phtag phi'; pt.textContent='En attente';
    al.className='abox ai'; al.textContent='Clique Démarrer';
    renderLiveEx(); return;
  }
  if(livePhase==='serie'){
    if(val>=palH){
      gf.style.background='var(--red)'; ne.style.color='var(--red)';
      pt.className='phtag phr'; pt.textContent='♻ Récupération';
      al.className='abox ar'; al.textContent='■ STOP — récupère jusqu\'à '+palB+' bpm';
      livePhase='recup';
      if(liveSets[liveExIdx]) liveSets[liveExIdx][liveSet]='done';
      liveSet++;
      if(liveSet>=(sexos[liveExIdx]?.series||0)){liveExIdx++;liveSet=0;}
      if(liveExIdx>=sexos.length){
        stopFCRecord();
        al.className='abox ag'; al.textContent='🎉 Séance terminée — bravo !';
        const btn=document.getElementById('actbtn');
        btn.textContent='📊 Voir mon compte rendu';
        btn.disabled=false;
        btn.onclick=()=>showCompteRendu();
        stopTimer(); return;
      }
      startTimer(); renderLiveEx();
    } else {
      gf.style.background='var(--acc)'; ne.style.color='var(--acc)';
      pt.className='phtag phs'; pt.textContent='● En série';
      al.className='abox aw'; al.textContent='● Continue — STOP à '+palH+' bpm';
    }
    return;
  }
  if(livePhase==='recup'){
    pt.className='phtag phr'; pt.textContent='♻ Récupération';
    if(val<=palB){
      gf.style.background='var(--green)'; ne.style.color='var(--green)';
      al.className='abox ag'; al.textContent='▶ FC ok — reprends la série !'; stopTimer();
    } else {
      gf.style.background='var(--orange)'; ne.style.color='var(--orange)';
      al.className='abox ai'; al.textContent='⏳ Récupère... encore '+(val-palB)+' bpm';
    }
    updateActBtn();
  }
}

function startTimer(){stopTimer();timerSec=0;timerIv=setInterval(()=>{timerSec++;const m=Math.floor(timerSec/60),s=timerSec%60;const el=document.getElementById('ltmr');if(el)el.textContent=m+':'+(s<10?'0':'')+s;},1000);}
function stopTimer(){if(timerIv){clearInterval(timerIv);timerIv=null;}}

// ===== COMPTE RENDU =====
function showCompteRendu(){
  const c = window._liveC || CU;
  const s = window._liveS;
  const data = fcData;
  const palH = c.palier_haut||Math.round(c.fc_max*.8);
  const palB = c.palier_bas||Math.round(c.fc_max*.6);

  if(!data.length){
    toast('Pas assez de données FC enregistrées');
    return;
  }

  const vals = data.map(d=>d.v);
  const fcMoy = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const fcMax = Math.max(...vals);
  const fcMin = Math.min(...vals);
  const dureeMin = Math.round(data[data.length-1].t / 60);
  const enZone = Math.round(vals.filter(v=>v>=palB&&v<palH).length/vals.length*100);

  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  const heureStr = now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});

  // Labels temps en mm:ss
  const labels = data.map(d=>{
    const m=Math.floor(d.t/60), sec=d.t%60;
    return m+'\''+String(sec).padStart(2,'0');
  });

  // Détruire ancien chart si existant
  if(window._crChart){ window._crChart.destroy(); window._crChart=null; }

  const modal = document.createElement('div');
  modal.className='cr-modal';
  modal.id='crModal';
  modal.innerHTML=`
    <div class="cr-wrap">
      <div class="cr-title">Compte Rendu</div>
      <div class="cr-sub">${c.prenom} ${c.nom||''} · ${s?.nom||'Séance'} · ${dateStr} à ${heureStr}</div>
      <div class="cr-stats">
        <div class="cr-stat">
          <div class="cr-stat-val" style="color:var(--blue)">${fcMoy}</div>
          <div class="cr-stat-lbl">FC Moyenne</div>
        </div>
        <div class="cr-stat">
          <div class="cr-stat-val" style="color:var(--red)">${fcMax}</div>
          <div class="cr-stat-lbl">FC Max</div>
        </div>
        <div class="cr-stat">
          <div class="cr-stat-val" style="color:var(--green)">${fcMin}</div>
          <div class="cr-stat-lbl">FC Min</div>
        </div>
        <div class="cr-stat">
          <div class="cr-stat-val" style="color:var(--acc)">${enZone}%</div>
          <div class="cr-stat-lbl">Temps en zone</div>
        </div>
      </div>
      <div class="cr-chart">
        <canvas id="crChart"></canvas>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:16px;display:flex;gap:16px;flex-wrap:wrap">
        <span>⏱ Durée : <strong style="color:var(--text)">${dureeMin} min</strong></span>
        <span>🔴 Palier stop : <strong style="color:var(--red)">${palH} bpm</strong></span>
        <span>🟢 Palier reprise : <strong style="color:var(--green)">${palB} bpm</strong></span>
      </div>
      <div class="cr-comment">
        <label>Commentaire (ressenti, douleurs, remarques...)</label>
        <textarea id="crComment" placeholder="Comment s'est passée la séance ?"></textarea>
      </div>
      <div class="cr-btns">
        <button class="cr-btn-back" onclick="document.getElementById('crModal').remove()">← Retour</button>
        <button class="cr-btn-wa" onclick="sendWhatsApp()">📲 Envoyer à Thomas</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  // Rendu Chart.js
  setTimeout(()=>{
    const ctx = document.getElementById('crChart');
    if(!ctx) return;
    window._crChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'FC (bpm)',
            data: vals,
            borderColor: '#47d9ff',
            backgroundColor: 'rgba(71,217,255,0.06)',
            borderWidth: 2,
            pointRadius: 2,
            pointBackgroundColor: vals.map(v=>v>=palH?'#ff4545':v>=palB?'#e8ff47':'#4ade80'),
            fill: true,
            tension: 0.3
          },
          {
            label: 'Stop '+palH,
            data: Array(vals.length).fill(palH),
            borderColor: 'rgba(255,69,69,.5)',
            borderWidth: 1,
            borderDash: [5,5],
            pointRadius: 0,
            fill: false
          },
          {
            label: 'Reprise '+palB,
            data: Array(vals.length).fill(palB),
            borderColor: 'rgba(74,222,128,.5)',
            borderWidth: 1,
            borderDash: [5,5],
            pointRadius: 0,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {display:false},
          tooltip:{callbacks:{label:c=>`${c.parsed.y} bpm`}}
        },
        scales: {
          x:{
            ticks:{maxTicksLimit:8,font:{size:10},color:'#666'},
            grid:{color:'rgba(255,255,255,.04)'}
          },
          y:{
            min: Math.max(40, fcMin-10),
            max: fcMax+10,
            ticks:{font:{size:10},color:'#666',callback:v=>v+' bpm'},
            grid:{color:'rgba(255,255,255,.04)'}
          }
        }
      }
    });
  }, 100);
}

function sendWhatsApp(){
  const c = window._liveC || CU;
  const s = window._liveS;
  const comment = document.getElementById('crComment')?.value || '';
  const vals = fcData.map(d=>d.v);
  if(!vals.length){toast('Pas de données FC');return;}
  const fcMoy = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
  const fcMax = Math.max(...vals);
  const fcMin = Math.min(...vals);
  const dureeMin = Math.round(fcData[fcData.length-1].t/60);
  const palH = c.palier_haut||Math.round(c.fc_max*.8);
  const palB = c.palier_bas||Math.round(c.fc_max*.6);
  const enZone = Math.round(vals.filter(v=>v>=palB&&v<palH).length/vals.length*100);
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  const msg = `📊 *Compte Rendu Séance MGFC*
👤 ${c.prenom} ${c.nom||''}
📅 ${dateStr}
🏋️ ${s?.nom||'Séance'}

❤️ FC Moyenne : *${fcMoy} bpm*
🔴 FC Max : *${fcMax} bpm*
🟢 FC Min : *${fcMin} bpm*
⏱ Durée : *${dureeMin} min*
✅ Temps en zone : *${enZone}%*

Palier stop : ${palH} bpm | Palier reprise : ${palB} bpm
${comment?'\n💬 '+comment:''}

_Envoyé depuis TomPulse MGFC_`;

  const phone = '33771612018';
  const url = `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// ===== COACH =====
function renderCoach(){
  document.getElementById('pgCoach').innerHTML=`
    <div class="pc">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">

async function selCoachClient(i){
  coachSelIdx=i; coachSessIdx=0;
  renderCoach();
  const c=allClients[i];
  loader(true,'Chargement...');
  const s = await sbSelect('seances',{client_id:c.id},'ordre');
  let e = [];
  for(const sid of (s||[]).map(x=>x.id)){
    const ex = await sbSelect('exercices',{seance_id:sid},'ordre');
    if(ex) e = e.concat(ex);
  }
  loader(false);
  coachCache[c.id]={seances:s||[],exercices:e};
  renderCoachEdit(i);
}

function renderCoachEdit(i){
  const c=allClients[i];
  const cd=coachCache[c.id]||{seances:[],exercices:[]};
  const opts=cd.seances.map((s,j)=>`<option value="${j}">${s.jour} — ${s.nom}</option>`).join('');
  document.getElementById('cedit').innerHTML=`
    <div class="ep">
      <div class="ep-t">
        <span>${c.prenom} ${c.nom} <span class="mbadge">${c.cycle||''}</span></span>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <select class="ssel" style="width:auto;font-size:11px" onchange="coachSessIdx=+this.value;renderCoachSessEdit(${i})">${opts}</select>

      </div>
      <div id="csrows"></div>
      <div style="margin-top:12px">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">Note personnalisée</div>
        <textarea class="nb" id="cnote" style="width:100%">${c.note_coach||''}</textarea>
      </div>
    </div>`;
  renderCoachSessEdit(i);
}

function renderCoachSessEdit(i){
  const c=allClients[i];
  const cd=coachCache[c.id];
  const s=cd.seances[coachSessIdx]; if(!s) return;
  const sexos=cd.exercices.filter(e=>e.seance_id===s.id).sort((a,b)=>a.ordre-b.ordre);
  s._exos=sexos;
  document.getElementById('csrows').innerHTML=`
    <div style="display:grid;grid-template-columns:2fr 55px 55px 85px 28px;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:3px">
      ${['Exercice','Séries','Reps','Charge',''].map(h=>`<div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${h}</div>`).join('')}
    </div>
    ${sexos.map((ex,j)=>`
    <div class="editrow">
      <input type="text" value="${ex.nom}" oninput="sexos[${j}].nom=this.value">
      <input type="number" value="${ex.series}" min="1" max="8" style="text-align:center" oninput="sexos[${j}].series=+this.value">
      <input type="text" value="${ex.repetitions}" style="text-align:center" oninput="sexos[${j}].repetitions=this.value">
      <input type="text" value="${ex.charge}" oninput="sexos[${j}].charge=this.value">
      <button class="db2" onclick="delExCoach('${ex.id}',${i})">✕</button>
    </div>`).join('')}
    <button class="addbtn" onclick="addExCoach('${s.id}',${i})">+ Ajouter un exercice</button>`;
}

async function delExCoach(exId,ci){
  await sbDelete('exercices',exId);
  await selCoachClient(ci); toast('Exercice supprimé');
}
async function addExCoach(seanceId,ci){
  const c=allClients[ci], cd=coachCache[c.id];
  const sexos=cd.exercices.filter(e=>e.seance_id===seanceId);
  await sbInsert('exercices',{seance_id:seanceId,ordre:sexos.length+1,nom:'Nouvel exercice',icone:'💪',series:3,repetitions:'12',charge:'',note:''});
  await selCoachClient(ci);
}
async function saveCoachClient(i){
  const c=allClients[i], cd=coachCache[c.id];
  const note=document.getElementById('cnote').value;
  const s=cd.seances[coachSessIdx];
  const sexos=s?cd.exercices.filter(e=>e.seance_id===s.id):[];
  loader(true,'Sauvegarde...');
  await sbUpdate('clients',c.id,{note_coach:note});
  c.note_coach=note;
  for(const ex of sexos) await sbUpdate('exercices',ex.id,{nom:ex.nom,series:ex.series,repetitions:ex.repetitions,charge:ex.charge});
  loader(false); toast('✓ Modifications sauvegardées !');
}

// ===== BLUETOOTH =====
async function connectBT(){
  if(!navigator.bluetooth){alert('Web Bluetooth: utilise Chrome ou Edge desktop.');return;}
  const d=document.getElementById('btd'),l=document.getElementById('btl'),p=document.getElementById('btp');
  d.classList.add('blink'); l.textContent='Recherche...';
  try{
    const dev=await navigator.bluetooth.requestDevice({filters:[{services:[0x180D]}]});
    l.textContent='Connexion...';
    const srv=await dev.gatt.connect();
    const svc=await srv.getPrimaryService(0x180D);
    const ch=await svc.getCharacteristic(0x2A37);
    await ch.startNotifications();
    ch.addEventListener('characteristicvaluechanged',e=>{
      const v=e.target.value;
      const bpm=(v.getUint8(0)&1)?v.getUint16(1,true):v.getUint8(1);
      const sl=document.getElementById('simsl');if(sl)sl.value=bpm;
      onFC(bpm,true);
    });
    d.classList.remove('blink'); p.classList.add('on'); l.textContent=dev.name.substring(0,14);
    dev.addEventListener('gattserverdisconnected',()=>{p.classList.remove('on');l.textContent='Déconnecté';});
  }catch(e){d.classList.remove('blink');l.textContent='Cardio BT';}
}
